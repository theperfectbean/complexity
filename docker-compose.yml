services:
  postgres:
    image: pgvector/pgvector:pg16-trixie
    container_name: complexity-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-backup:
    image: pgvector/pgvector:pg16-trixie
    container_name: complexity-postgres-backup
    volumes:
      - ./backups/postgres:/backups
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        while true; do
          FILENAME=/backups/backup-$$(date +%Y-%m-%d-%H%M).sql
          echo "[ $$(date) ] Starting backup to $$FILENAME..."
          pg_dump -h postgres > "$$FILENAME"
          echo "[ $$(date) ] Backup complete. Cleaning up old backups (keeping last 7 days)..."
          find /backups -type f -name 'backup-*.sql' -mtime +7 -delete
          sleep 86400
        done
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: complexity-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  embedder:
    build:
      context: ./embedder
      dockerfile: Dockerfile
    container_name: complexity-embedder
    environment:
      - SENTENCE_TRANSFORMERS_HOME=/models
    volumes:
      - ./.data/models:/models
    expose:
      - "8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=.docker-cache/app
      cache_to:
        - type=local,dest=.docker-cache/app,mode=min
    container_name: complexity-app
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    volumes:
      - ./.data/external:/app/external:ro
    depends_on:
      postgres:
        condition: service_healthy
      embedder:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3002:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  embedding_models:
