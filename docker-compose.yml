services:
  postgres:
    image: pgvector/pgvector:pg16-trixie
    container_name: complexity-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: complexity-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  embedder:
    build:
      context: ./embedder
      dockerfile: Dockerfile
    container_name: complexity-embedder
    environment:
      - SENTENCE_TRANSFORMERS_HOME=/models
    volumes:
      - embedding_models:/models
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=.docker-cache/app
      cache_to:
        - type=local,dest=.docker-cache/app,mode=min
    container_name: complexity-app
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      embedder:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3002:3000"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  embedding_models:
